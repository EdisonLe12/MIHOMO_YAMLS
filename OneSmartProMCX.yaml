    - dlg.io.mi.com
    - "+.push.apple.com"
    - "+.oray.com"      # еҗ‘ж—Ҙи‘ө
    - "+.sunlogin.net"
    - "+.crashlytics.com"
  parse-pure-ip: true                      # е—…жҺўзәҜ IP (ејәеҲ¶еҜ№ IP иҝӣиЎҢеҸҚеҗ‘жҺўжөӢ)
  force-dns-mapping: true                  # ејәеҲ¶ DNS жҳ е°„ (д»Һ Fake-IP иҝҳеҺҹеҹҹеҗҚ)

# TUNжЁЎејҸй…ҚзҪ®
tun:
  enable: true                             # ејҖеҗҜ TUN жЁЎејҸ
  stack: mixed                             # еҚҸи®®ж Ҳпјҡmixed (ж··еҗҲ) / system / gvisor
  dns-hijack:                              # DNS еҠ«жҢҒ (ејәеҲ¶жҺҘз®Ўи®ҫеӨҮ DNS жҹҘиҜў)
    - "any:53"                             # еҠ«жҢҒжүҖжңү UDP 53
    - "tcp://any:53"                       # еҠ«жҢҒжүҖжңү TCP 53
  auto-route: true                         # иҮӘеҠЁй…ҚзҪ®и·Ҝз”ұиЎЁ
  auto-detect-interface: true              # иҮӘеҠЁжЈҖжөӢзҪ‘з»ңжҺҘеҸЈ
  auto-redirect: true                      # иҮӘеҠЁй…ҚзҪ® iptables йҮҚе®ҡеҗ‘
  endpoint-independent-nat: true           # зӢ¬з«Ӣ NAT (Full Cone)пјҢдјҳеҢ–жёёжҲҸ/P2P 

# DNSй…ҚзҪ®
