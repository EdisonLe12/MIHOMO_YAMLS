  store-fake-ip: true                     # дҝқеӯҳйҖүжӢ© Fake-IP жҳ е°„иЎЁ (еҠ йҖҹдәҢж¬ЎеҠ иҪҪ)

# жөҒйҮҸе—…жҺў
sniffer:
  enable: true                            # ејҖеҗҜз”Ёе—…жҺўеҠҹиғҪ
  override-destination: true              # дҪҝз”Ёе—…жҺўз»“жһңиҰҶзӣ–иҝһжҺҘзӣ®ж ҮпјҲжҺЁиҚҗејҖеҗҜпјү
  sniff:                                  # е—…жҺўеҚҸи®®й…ҚзҪ®
    QUIC:                                 # QUIC еҚҸи®®е—…жҺўпјҲHTTP/3пјү
      ports: [443, 8443]
    TLS:                                  # TLS еҚҸи®®е—…жҺўпјҲHTTPSпјү
      ports: [443, 8443]
    HTTP:                                 # HTTP еҚҸи®®е—…жҺў
      ports: [80, 8080-8880]
      override-destination: true
  force-domain:                           # ејәеҲ¶е—…жҺўиҜҶеҲ«зҡ„еҹҹеҗҚ
