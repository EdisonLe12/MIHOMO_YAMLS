  listen: 0.0.0.0:7874                     # DNS зӣ‘еҗ¬з«ҜеҸЈ (OpenClash иҪ¬еҸ‘зӣ®ж Ү)
  ipv6: true                               # еҗҜз”Ё IPv6 и§Јжһҗ
