  - rule-set:Private
  - rule-set:China
  - rule-set:Trackers
  - "+.lan"
  - "+.local"
  - "checkip.dyndns.org"
  - "connectivitycheck.gstatic.com"
  - "+.push.apple.com"
  - "time.nist.gov"
  - "time.windows.com"
  - "+.battlenet.com"
  - "+.blzstatic.cn"
  - "+.nintendo.net"
  - "+.xboxlive.com"
  - "+.stun.playstation.net"
  - "+.docker.io"
